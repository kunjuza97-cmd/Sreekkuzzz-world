<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sreekkuzzz World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            /* ⬇️ നിങ്ങളുടെ ഫോട്ടോയുടെ പേര് ഇവിടെ മാറ്റി കൊടുക്കാം */
            background: url('1000099889.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: bold;
            text-align: center;
            margin: 20px 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #000000;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.5);
        }

        .number-title {
            font-size: 5rem;
            font-weight: bold;
            margin: 10px 0;
            color: white;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .about-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 25px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .about-box h2 {
            font-size: 1.2rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #000000;
            font-weight: bold;
        }

        .about-box p {
            font-size: 1rem;
            line-height: 1.5;
            color: #111;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background-color: #2b1d0c;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            text-decoration: none;
            font-style: italic;
            font-weight: bold;
            width: 75%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        hr {
            width: 90%;
            border: 0;
            height: 1px;
            background: rgba(255,255,255,0.5);
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="header-title">GLADY WELCOME TO<br>PULLS</div>
    <hr>
    <div class="number-title">46</div>

    <div class="about-box">
        <h2>ABOUT</h2>
        <p>വെൽക്കം! ഇത് എന്റെ സ്വന്തം വെബ്‌സൈറ്റ് ആണ്. ഇവിടെ നിങ്ങൾക്ക് പുതിയ ട്രെൻഡുകളും വിശേഷങ്ങളും കാണാം.</p>
    </div>

    <hr>
    <a href="#" class="btn">come to realworld</a>

</body>
</html>
